name: License Header Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  check-license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check license headers
        run: |
          MISSING=0
          while IFS= read -r f; do
            content=$(cat "$f")
            if [[ "$content" =~ ^/\*\*.*Copyright\ 2026\.*熊高锐 ]]; then
              :
            else
              echo "MISSING HEADER: $f"
              MISSING=$((MISSING+1))
            fi
          done < <(find src tests -name "*.ts" ! -path "*/node_modules/*")
          if [ "$MISSING" -gt 0 ]; then
            echo "FAILED: $MISSING files missing license headers"
            exit 1
          fi
          echo "All files have valid license headers."
